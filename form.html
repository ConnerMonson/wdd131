<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Activity | WDD 131</title>
    <meta name="description" content="WDD 131 form activity focusing on designing forms that are easy to use.">
    <meta name="author" content="Conner Monson">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form action="review.html" method="get" >
            <fieldset>
                <label for="product">Product Name*
                    <select id="product" name="product" required>
                        <option value="" disabled selected >Select a product...</option>
                    </select>
                </label>
                <div>Overall Rating*</div>
                <div class="rating">
                    <label class="star-rating" for="star1">★</label>
                        <input type="radio" name="star" id="star1" value="1" required>

                    <label class="star-rating" for="star2">★★</label>
                        <input type="radio" name="star" id="star2" value="2" required>

                    <label class="star-rating" for="star3">★★★</label>
                        <input type="radio" name="star" id="star3" value="3" required>

                    <label class="star-rating" for="star4">★★★★</label>
                        <input type="radio" name="star" id="star4" value="4" required>

                    <label class="star-rating" for="star5">★★★★★</label>
                        <input type="radio" name="star" id="star5" value="5" required>

                </div>
                <label for="installation">Date of Installation*
                    <input type="date" name="installation" id="installation" required>
                </label>

                <div>Which features did you find useful in the product (Check all that apply)</div>
                <label for="durable"><input type="checkbox" name="durable" id="durable">Durability</label>
                <label for="easyUse"><input type="checkbox" name="easyUse" id="easyUse">Ease of Use</label>
                <label for="performance"><input type="checkbox" name="performance" id="performance">Performance</label>
                <label for="design"><input type="checkbox" name="design" id="design">Design</label>

                <label for="writtenReview">
                    Written Review <span>(Optional)</span>
                    <textarea name="review" id="writtenReview" rows="5"></textarea>
                </label>

                
                <label for="userName">
                    Your Name <span>(Optional)</span>
                    <input type="text" name="name" id="userName">
                </label>

                <input type="submit" value="Post Review">
            </fieldset>
            
        </form>
    </main>
    <footer>
        <p>©<span id="currentyear"></span> 🇺🇸 Conner Monson 🇺🇸 Texas, USA</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
